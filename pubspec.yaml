name: vela_bakery
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.2

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.5.5
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  cloud_firestore: ^6.1.3
  firebase_core: ^4.5.0
  firebase_storage: ^13.3.1
  image_picker: ^1.2.1
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo2.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
